<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lyrics Player</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">LYRICS PLAYER</div>
      <select id="songSelect" class="song-select"></select>
    </header>

    <main class="main">
      <div class="meta">
        <div class="title" id="songTitle">Title</div>
        <div class="artist" id="songArtist">Artist</div>
      </div>

      <div class="lyrics-wrap">
        <div class="lyrics" id="lyrics"></div>
      </div>
    </main>

    <footer class="bottom">
      <div class="controls">
        <button class="btn" id="prevBtn">◀ Prev</button>
        <button class="btn" id="playPauseBtn">▶ Play</button>
        <button class="btn" id="nextBtn">Next ▶</button>
      </div>

      <div class="timeline" id="timeline">
        <div class="progress" id="progress"></div>
      </div>

      <div class="time" id="timeText">0:00 / 0:00</div>
    </footer>
  </div>

  <div class="start-screen" id="startScreen">
    <div class="start-card">
      <h1>Music Start</h1>
      <p>
        曲を選んで再生。<br>
        軽量で、雰囲気のある歌詞ページ。
      </p>
      <button class="btn" id="startBtn">再生する</button>
    </div>
  </div>

  <audio id="audio" preload="metadata"></audio>

  <script src="script.js"></script>
</body>
</html>
