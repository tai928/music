<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Midnight Lyrics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg1: #070b14;
      --bg2: #11182b;
      --bg3: #1c1633;
      --text: rgba(255,255,255,0.96);
      --sub: rgba(255,255,255,0.55);
      --line: rgba(255,255,255,0.18);
      --glass: rgba(255,255,255,0.08);
      --glow: rgba(155, 185, 255, 0.28);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #05070d;
      font-family: "Noto Sans JP", sans-serif;
      color: var(--text);
    }

    body {
      position: relative;
      background:
        radial-gradient(circle at 20% 20%, rgba(120, 140, 255, 0.18), transparent 28%),
        radial-gradient(circle at 80% 35%, rgba(190, 120, 255, 0.10), transparent 24%),
        radial-gradient(circle at 50% 80%, rgba(255, 255, 255, 0.05), transparent 30%),
        linear-gradient(145deg, var(--bg1), var(--bg2), var(--bg3));
    }

    .grain::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.05;
      background-image:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.08) 0px,
          rgba(255,255,255,0.08) 1px,
          transparent 1px,
          transparent 3px
        );
      mix-blend-mode: soft-light;
    }

    .light {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.7;
      animation: float 10s ease-in-out infinite alternate;
      pointer-events: none;
    }

    .light1 {
      width: 42vw;
      height: 42vw;
      left: -10vw;
      top: -8vw;
      background: rgba(109, 149, 255, 0.22);
    }

    .light2 {
      width: 35vw;
      height: 35vw;
      right: -6vw;
      top: 18vh;
      background: rgba(189, 128, 255, 0.16);
      animation-duration: 13s;
    }

    .light3 {
      width: 30vw;
      height: 30vw;
      bottom: -10vw;
      left: 38vw;
      background: rgba(255,255,255,0.08);
      animation-duration: 16s;
    }

    @keyframes float {
      from {
        transform: translate3d(-10px, -12px, 0) scale(1);
      }
      to {
        transform: translate3d(18px, 18px, 0) scale(1.12);
      }
    }

    .frame {
      position: absolute;
      inset: 24px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      backdrop-filter: blur(16px);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 24px 80px rgba(0,0,0,0.35);
    }

    .topbar {
      position: absolute;
      top: 34px;
      left: 42px;
      right: 42px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 3;
      font-size: 0.85rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--sub);
    }

    .brand {
      font-weight: 700;
      color: rgba(255,255,255,0.88);
    }

    .meta {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.65);
      box-shadow: 0 0 10px rgba(255,255,255,0.4);
    }

    .main {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 28px 120px;
      z-index: 2;
    }

    .lyrics-wrap {
      width: min(100%, 1000px);
      text-align: center;
    }

    .lyrics-sub {
      font-size: 0.8rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--sub);
      margin-bottom: 18px;
    }

    .lyrics {
      min-height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: pre-wrap;
      line-height: 1.5;
      font-size: clamp(2rem, 6vw, 5.6rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-shadow:
        0 0 22px rgba(255,255,255,0.10),
        0 0 55px rgba(155,185,255,0.10);
      opacity: 0;
      transform: translateY(24px) scale(0.985);
      filter: blur(14px);
      transition:
        opacity 0.85s cubic-bezier(.22,1,.36,1),
        transform 0.85s cubic-bezier(.22,1,.36,1),
        filter 0.85s cubic-bezier(.22,1,.36,1);
    }

    .lyrics.show {
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: blur(0);
    }

    .lyrics.hide {
      opacity: 0;
      transform: translateY(-10px) scale(1.01);
      filter: blur(12px);
    }

    .bottom {
      position: absolute;
      left: 42px;
      right: 42px;
      bottom: 34px;
      z-index: 3;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .control {
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      padding: 12px 18px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 500;
      backdrop-filter: blur(12px);
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .control:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.10);
      border-color: rgba(255,255,255,0.18);
    }

    .timeline {
      flex: 1;
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
      position: relative;
      backdrop-filter: blur(8px);
    }

    .timeline::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
    }

    .bar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(255,255,255,0.95), rgba(180,205,255,0.9));
      box-shadow: 0 0 22px var(--glow);
      transition: width 0.08s linear;
    }

    .start-screen {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(4,6,12,0.24);
      backdrop-filter: blur(10px);
    }

    .start-card {
      width: min(92vw, 520px);
      padding: 34px 28px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.05));
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: 0 20px 80px rgba(0,0,0,0.38);
      text-align: center;
    }

    .eyebrow {
      font-size: 0.78rem;
      color: var(--sub);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .start-card h1 {
      font-size: clamp(2rem, 5vw, 3.6rem);
      line-height: 1.1;
      margin-bottom: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .start-card p {
      color: rgba(255,255,255,0.72);
      line-height: 1.9;
      font-size: 0.97rem;
      margin-bottom: 26px;
    }

    .start-btn {
      border: none;
      background: linear-gradient(135deg, rgba(255,255,255,0.96), rgba(215,228,255,0.92));
      color: #0d1222;
      padding: 14px 26px;
      font-size: 0.98rem;
      font-weight: 700;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 10px 35px rgba(180,205,255,0.18);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .start-btn:hover {
      transform: translateY(-1px) scale(1.02);
      box-shadow: 0 16px 45px rgba(180,205,255,0.22);
    }

    .credit {
      margin-top: 14px;
      color: rgba(255,255,255,0.42);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
    }

    @media (max-width: 700px) {
      .frame {
        inset: 12px;
        border-radius: 22px;
      }

      .topbar,
      .bottom {
        left: 18px;
        right: 18px;
      }

      .topbar {
        top: 20px;
      }

      .bottom {
        bottom: 20px;
      }

      .lyrics {
        min-height: 140px;
      }

      .meta span:last-child {
        display: none;
      }
    }
  </style>
</head>
<body class="grain">
  <div class="light light1"></div>
  <div class="light light2"></div>
  <div class="light light3"></div>

  <div class="frame"></div>

  <div class="topbar">
    <div class="brand">MIDNIGHT / LYRICS</div>
    <div class="meta">
      <div class="dot"></div>
      <span>visual audio page</span>
    </div>
  </div>

  <main class="main">
    <div class="lyrics-wrap">
      <div class="lyrics-sub">now playing</div>
      <div class="lyrics" id="lyrics"></div>
    </div>
  </main>

  <div class="bottom">
    <button class="control" id="playPauseBtn">Pause</button>
    <div class="timeline">
      <div class="bar" id="progressBar"></div>
    </div>
  </div>

  <div class="start-screen" id="startScreen">
    <div class="start-card">
      <div class="eyebrow">music experience</div>
      <h1>Press to begin</h1>
      <p>
        音に合わせて、ことばが浮かんで、消えていく。<br>
        ただ再生するだけじゃない、雰囲気ごと見せるページ。
      </p>
      <button class="start-btn" id="startBtn">Play the song</button>
      <div class="credit">Put your file as <strong>song.mp3</strong></div>
    </div>
  </div>

  <audio id="music" preload="auto">
    <source src="song.mp3" type="audio/mpeg" />
  </audio>

  <script>
    const lyricsData = [
      { start: 0.5, end: 3.8, text: "最初のフレーズを置く" },
      { start: 4.2, end: 7.0, text: "静かに浮かんで" },
      { start: 7.4, end: 10.8, text: "余韻を残して消えていく" },
      { start: 11.5, end: 15.5, text: "サビ前は少し長めに見せる" },
      { start: 16.0, end: 21.0, text: "ここにいちばん映える歌詞を入れる" }
    ];

    const audio = document.getElementById("music");
    const lyricsEl = document.getElementById("lyrics");
    const startBtn = document.getElementById("startBtn");
    const startScreen = document.getElementById("startScreen");
    const playPauseBtn = document.getElementById("playPauseBtn");
    const progressBar = document.getElementById("progressBar");

    let currentIndex = -1;
    let hideTimer = null;
    let showTimer = null;

    function setLyrics(index) {
      clearTimeout(hideTimer);
      clearTimeout(showTimer);

      if (index === -1) {
        lyricsEl.classList.remove("show");
        lyricsEl.classList.add("hide");
        hideTimer = setTimeout(() => {
          if (currentIndex === -1) {
            lyricsEl.textContent = "";
            lyricsEl.classList.remove("hide");
          }
        }, 700);
        return;
      }

      lyricsEl.classList.remove("show");
      lyricsEl.classList.add("hide");

      showTimer = setTimeout(() => {
        if (currentIndex === index) {
          lyricsEl.textContent = lyricsData[index].text;
          lyricsEl.classList.remove("hide");
          lyricsEl.classList.add("show");
        }
      }, 180);
    }

    function updateUI() {
      const currentTime = audio.currentTime;

      const newIndex = lyricsData.findIndex(
        line => currentTime >= line.start && currentTime < line.end
      );

      if (newIndex !== currentIndex) {
        currentIndex = newIndex;
        setLyrics(currentIndex);
      }

      if (audio.duration) {
        progressBar.style.width = `${(currentTime / audio.duration) * 100}%`;
      }
    }

    async function startPlayback() {
      try {
        await audio.play();
        startScreen.style.display = "none";
        playPauseBtn.textContent = "Pause";
      } catch (error) {
        alert("再生できませんでした。song.mp3 の配置を確認してね。");
        console.error(error);
      }
    }

    function togglePlayback() {
      if (audio.paused) {
        audio.play();
      } else {
        audio.pause();
      }
    }

    startBtn.addEventListener("click", startPlayback);
    playPauseBtn.addEventListener("click", togglePlayback);

    audio.addEventListener("timeupdate", updateUI);

    audio.addEventListener("play", () => {
      playPauseBtn.textContent = "Pause";
    });

    audio.addEventListener("pause", () => {
      playPauseBtn.textContent = "Play";
    });

    audio.addEventListener("ended", () => {
      currentIndex = -1;
      setLyrics(-1);
      progressBar.style.width = "0%";
      playPauseBtn.textContent = "Play";
      startScreen.style.display = "flex";
    });
  </script>
</body>
</html>
